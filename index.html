<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortek.com.vn - Hệ thống đang nâng cấp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0056b3; /* Màu xanh chuyên nghiệp */
            --secondary-color: #343a40;
            --text-color: #2d3436;
        }

        * { margin: 0; padding: 0; box-box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 90%;
            position: relative;
            z-index: 1;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .icon-box {
            font-size: 60px;
            color: #ff9f43;
            margin-bottom: 25px;
            animation: gear-rotate 4s linear infinite;
        }

        @keyframes gear-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            color: var(--secondary-color);
        }

        p {
            line-height: 1.6;
            color: #636e72;
            margin-bottom: 30px;
        }

        .progress-container {
            background-color: #eee;
            border-radius: 10px;
            height: 10px;
            width: 100%;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--primary-color), #00d2ff);
            height: 100%;
            width: 75%; /* Bạn có thể chỉnh phần trăm hoàn thành tại đây */
            border-radius: 10px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }

        .contact-info {
            border-top: 1px solid #eee;
            padding-top: 20px;
            font-size: 14px;
        }

        .contact-info a {
            color: var(--primary-color);
            text-decoration: none;
            margin: 0 10px;
            font-weight: 600;
        }

        /* Trang trí nền */
        .bg-circle {
            position: absolute;
            background: rgba(0, 86, 179, 0.05);
            border-radius: 50%;
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="bg-circle" style="width: 400px; height: 400px; top: -100px; right: -100px;"></div>
    <div class="bg-circle" style="width: 300px; height: 300px; bottom: -50px; left: -50px;"></div>

    <div class="container">
        <div class="logo">FORTEK</div>
        <div class="icon-box">
            <i class="fas fa-cog"></i>
        </div>
        <h1>Hệ Thống Đang Nâng Cấp</h1>
        <p>
            Chào bạn, website <strong>fortek.com.vn</strong> đang thực hiện bảo trì định kỳ để cập nhật những tính năng mới nhất. Chúng tôi sẽ trở lại trong thời gian sớm nhất.
        </p>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <div class="contact-info">
            <p>Mọi thắc mắc vui lòng liên hệ:</p>
            <a href="mailto:info@fortek.com.vn"><i class="fas fa-envelope"></i> info@fortek.com.vn</a>
            </div>
    </div>
</body>
</html>
